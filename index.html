<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Linterra</title>
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #12151c;
      }

      body {
        font-family: sans-serif;
      }

      #canvas {
        display: block;
        width: 100vw;
        height: 100vh;
        cursor: grab;
      }

      #canvas:active {
        cursor: grabbing;
      }

      .controls-hint {
        position: fixed;
        left: 16px;
        bottom: 16px;
        padding: 10px 12px;
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 999px;
        background: rgba(9, 11, 18, 0.72);
        color: rgba(255, 255, 255, 0.92);
        font-size: 13px;
        letter-spacing: 0.01em;
        backdrop-filter: blur(10px);
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <canvas id="canvas"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
